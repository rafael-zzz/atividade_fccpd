services:
  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: Gateway
    ports:
      - "5050:5000"
    environment:
      - ASPNETCORE_URLS=https://+:5000
      - USERS_SERVICE_URL=https://users:5001
      - PRODUCTS_SERVICE_URL=https://products:5002
      - ORDERS_SERVICE_URL=https://orders:5003
      - JWT_SECRET=MiniEcommerceSecretKey2024SuperSegura!@#$$%
      - CERT_PATH=/certs/devcert.pfx
      - CERT_PASSWORD=devpassword
    depends_on:
      users:
        condition: service_healthy
      products:
        condition: service_healthy
      orders:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["dotnet", "Gateway.dll"]

  users:
    build:
      context: .
      args:
        SERVICE_NAME: Users
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=https://+:5001
      - JWT_SECRET=MiniEcommerceSecretKey2024SuperSegura!@#$$%
      - CERT_PATH=/certs/devcert.pfx
      - CERT_PASSWORD=devpassword
    volumes:
      - users-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["dotnet", "Users.dll"]

  products:
    build:
      context: .
      args:
        SERVICE_NAME: Products
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_URLS=https://+:5002
      - JWT_SECRET=MiniEcommerceSecretKey2024SuperSegura!@#$$%
      - CERT_PATH=/certs/devcert.pfx
      - CERT_PASSWORD=devpassword
    volumes:
      - products-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:5002/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["dotnet", "Products.dll"]

  orders:
    build:
      context: .
      args:
        SERVICE_NAME: Orders
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_URLS=https://+:5003
      - JWT_SECRET=MiniEcommerceSecretKey2024SuperSegura!@#$$%
      - USERS_SERVICE_URL=https://users:5001
      - PRODUCTS_SERVICE_URL=https://products:5002
      - CERT_PATH=/certs/devcert.pfx
      - CERT_PASSWORD=devpassword
    volumes:
      - orders-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:5003/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["dotnet", "Orders.dll"]

  # Container de teste end-to-end
  test:
    build:
      context: ./tests
    environment:
      - BASE_URL=https://gateway:5000
    depends_on:
      gateway:
        condition: service_healthy
    profiles:
      - test

volumes:
  users-data:
  products-data:
  orders-data:
