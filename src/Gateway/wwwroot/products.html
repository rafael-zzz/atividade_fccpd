<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviço de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-center text-teal-600">Serviço de Produtos (/products)</h1>
        
        <p class="text-center text-sm text-gray-600">Dica: Crie uma conta de Usuário com "admin" no e-mail para ter permissões aqui.</p>

        <!-- List Products -->
        <div class="bg-white p-6 rounded-lg shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Listar Produtos</h2>
                <button onclick="fetchProducts()" class="bg-teal-500 text-white px-4 py-2 rounded hover:bg-teal-600">Atualizar</button>
            </div>
            <ul id="productsList" class="space-y-2 border p-4 rounded bg-gray-50 min-h-[50px]"></ul>
        </div>

        <!-- Get Single Product -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">Buscar Produto (ID)</h2>
            <form id="fetchForm" class="flex space-x-2">
                <input type="text" id="prodId" placeholder="ID do Produto" class="flex-1 border p-2 rounded" required>
                <button type="submit" class="bg-gray-700 text-white px-4 py-2 rounded">Buscar</button>
            </form>
        </div>

        <!-- Create Product (Admin Only) -->
        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
            <h2 class="text-xl font-semibold mb-4 text-red-600">Criar Produto (Apenas Admin)</h2>
            <form id="createForm" class="space-y-3">
                <input type="text" id="newName" placeholder="Nome do Produto" class="w-full border p-2 rounded" required>
                <input type="number" step="0.01" id="newPrice" placeholder="Preço" class="w-full border p-2 rounded" required>
                <textarea id="newDesc" placeholder="Descrição" class="w-full border p-2 rounded"></textarea>
                <button type="submit" class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600">Cadastrar Produto</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5002';

        async function fetchProducts() {
            const res = await fetch(`${API_URL}/products`);
            const data = await res.json();
            const list = document.getElementById('productsList');
            list.innerHTML = '';
            if(data.length === 0) list.innerHTML = '<li class="text-gray-500">Nenhum produto cadastrado.</li>';
            data.forEach(p => {
                list.innerHTML += `<li class="p-2 bg-white shadow rounded border-l-4 border-teal-400">
                    <strong>${p.name}</strong> - R$${p.price.toFixed(2)}
                    <div class="text-xs text-gray-400">ID: ${p.id}</div>
                </li>`;
            });
        }

        document.getElementById('fetchForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('prodId').value;
            const res = await fetch(`${API_URL}/products/${id}`);
            if (res.ok) {
                const data = await res.json();
                alert(`Produto: ${data.name}\nPreço: R$${data.price}\nDescrição: ${data.description}`);
            } else {
                alert("Produto não encontrado.");
            }
        };

        document.getElementById('createForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('jwt_token');
            if (!token) return alert("Você precisa estar logado (como Admin) no Serviço de Usuários.");

            const res = await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    Name: document.getElementById('newName').value,
                    Price: parseFloat(document.getElementById('newPrice').value),
                    Description: document.getElementById('newDesc').value
                })
            });

            if (res.status === 403) return alert("Acesso Negado! Você precisa ser Admin.");
            if (res.status === 401) return alert("Token inválido ou expirado.");

            if (res.ok) {
                alert("Produto criado com sucesso!");
                document.getElementById('createForm').reset();
                fetchProducts();
            }
        };

        // Carrega inicial
        fetchProducts();
    </script>
</body>
</html>
