<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-commerce — Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f1f5f9;
            letter-spacing: -0.025em;
        }

        header p {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card.online {
            border-color: #22c55e40;
            box-shadow: 0 0 12px #22c55e15;
        }

        .card.offline {
            border-color: #ef444440;
            box-shadow: 0 0 12px #ef444415;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: #f1f5f9;
            text-transform: capitalize;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .status-badge.online {
            background-color: #22c55e20;
            color: #22c55e;
        }

        .status-badge.offline {
            background-color: #ef444420;
            color: #ef4444;
        }

        .card-details {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .card-details p {
            margin-bottom: 0.25rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.75rem;
        }

        .events-container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.25rem;
        }

        .events-list {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }

        .events-list::-webkit-scrollbar {
            width: 6px;
        }

        .events-list::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .events-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .event-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.625rem 0;
            border-bottom: 1px solid #334155;
            font-size: 0.8125rem;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-time {
            color: #64748b;
            white-space: nowrap;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            min-width: 140px;
        }

        .event-type {
            font-weight: 600;
            white-space: nowrap;
        }

        .event-type.falha {
            color: #ef4444;
        }

        .event-type.recuperacao {
            color: #22c55e;
        }

        .event-message {
            color: #cbd5e1;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }

        .last-update {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mini E-commerce — Monitor</h1>
        <p>Status dos microsserviços em tempo real</p>
    </header>

    <div class="container">
        <div class="cards" id="cards">
            <!-- Cards are populated by JS -->
        </div>

        <h2 class="section-title">📋 Histórico de Eventos</h2>
        <div class="events-container">
            <div class="events-list" id="events-list">
                <div class="empty-state" id="empty-state">Nenhum evento registrado ainda.</div>
            </div>
        </div>

        <p class="last-update" id="last-update"></p>
    </div>

    <script>
        const API_URL = '/api/gateway/status';
        const POLL_INTERVAL = 3000;

        function createCard(service) {
            const statusClass = service.isHealthy ? 'online' : 'offline';
            const statusText = service.isHealthy ? '🟢 Online' : '🔴 Offline';

            return `
                <div class="card ${statusClass}">
                    <div class="card-header">
                        <span class="card-name">${service.name}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="card-details">
                        <p><strong>URL:</strong> ${service.url}</p>
                        <p><strong>Último check:</strong> ${service.lastCheck}</p>
                        <p><strong>Falhas consecutivas:</strong> ${service.failCount}</p>
                    </div>
                </div>
            `;
        }

        function createEventItem(event) {
            const typeClass = event.type === 'FALHA' ? 'falha' : 'recuperacao';
            const typeIcon = event.type === 'FALHA' ? '🔴' : '🟢';

            return `
                <div class="event-item">
                    <span class="event-time">${event.timestamp}</span>
                    <span class="event-type ${typeClass}">${typeIcon} ${event.type}</span>
                    <span class="event-message">${event.message}</span>
                </div>
            `;
        }

        async function fetchStatus() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Update cards
                const cardsContainer = document.getElementById('cards');
                cardsContainer.innerHTML = data.services.map(createCard).join('');

                // Update events
                const eventsList = document.getElementById('events-list');
                const emptyState = document.getElementById('empty-state');

                if (data.events && data.events.length > 0) {
                    eventsList.innerHTML = data.events
                        .slice()
                        .reverse()
                        .map(createEventItem)
                        .join('');
                    // Auto-scroll to top (newest events)
                    eventsList.scrollTop = 0;
                } else {
                    eventsList.innerHTML = '<div class="empty-state">Nenhum evento registrado ainda.</div>';
                }

                // Update timestamp
                document.getElementById('last-update').textContent =
                    `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;

            } catch (error) {
                console.error('Erro ao buscar status:', error);
                document.getElementById('last-update').textContent =
                    `Erro na conexão — ${new Date().toLocaleTimeString('pt-BR')}`;
            }
        }

        // Initial fetch
        fetchStatus();

        // Poll every 3 seconds
        setInterval(fetchStatus, POLL_INTERVAL);
    </script>
</body>
</html>
