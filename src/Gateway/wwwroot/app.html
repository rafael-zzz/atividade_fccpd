<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-commerce App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#1e293b' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    
    <!-- Navbar -->
    <nav class="bg-secondary text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span class="font-bold text-xl tracking-tight">Mini E-commerce</span>
                </div>
                <div id="navUser" class="hidden flex items-center space-x-4">
                    <span class="text-sm font-medium"><i class="fas fa-user-circle mr-1"></i><span id="userNameNav"></span></span>
                    <span id="userRoleNav" class="bg-blue-600 text-xs px-2 py-1 rounded-full uppercase tracking-wider font-semibold"></span>
                    <button onclick="logout()" class="hover:text-red-400 transition-colors text-sm font-semibold"><i class="fas fa-sign-out-alt mr-1"></i>Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Auth Section -->
        <div id="authSection" class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col md:flex-row">
                
                <!-- Login -->
                <div class="p-8 w-full md:w-1/2 border-b md:border-b-0 md:border-r border-gray-100">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-sign-in-alt mr-2 text-primary"></i>Acesso</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="admin@admin.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                            <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="admin123">
                        </div>
                        <button onclick="login()" class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg shadow transition duration-200">
                            Entrar
                        </button>
                    </div>
                </div>

                <!-- Register -->
                <div class="p-8 w-full md:w-1/2 bg-gray-50">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-user-plus mr-2 text-green-500"></i>Cadastro</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                            <input type="text" id="regName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Seu Nome">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="regEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="seu@email.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                            <input type="password" id="regPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="******">
                        </div>
                        <button onclick="register()" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-4 rounded-lg shadow transition duration-200">
                            Registrar
                        </button>
                    </div>
                </div>
            </div>
            <div id="authMsg" class="mt-4 text-center text-sm font-medium"></div>
        </div>

        <!-- Main Dashboard -->
        <div id="mainSection" class="hidden space-y-8">
            
            <!-- Admin Product Creation -->
            <div id="adminProductSection" class="hidden bg-white p-6 rounded-xl shadow-sm border border-yellow-100 border-l-4 border-l-yellow-400">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex justify-between items-center">
                    <span><i class="fas fa-box-open text-yellow-500 mr-2"></i>Adicionar Produto (Área Admin)</span>
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="prodName" class="px-4 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Nome do Produto">
                    <input type="text" id="prodDesc" class="px-4 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Descrição">
                    <input type="number" id="prodPrice" class="px-4 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Preço (R$)" step="0.01">
                    <div class="flex space-x-2">
                        <input type="number" id="prodStock" class="w-1/2 px-4 py-2 border rounded-lg focus:ring-2 outline-none" placeholder="Estoque">
                        <button onclick="createProduct()" class="w-1/2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg font-semibold shadow transition text-sm">Criar</button>
                    </div>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <!-- Products List -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col h-[600px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-store text-primary mr-2"></i>Catálogo de Produtos</h2>
                        <button onclick="loadProducts()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded transition"><i class="fas fa-sync-alt mr-1"></i>Atualizar</button>
                    </div>
                    <div id="productList" class="flex-1 overflow-y-auto space-y-4 pr-2">
                        <!-- Products Load Here -->
                    </div>
                </div>

                <!-- Orders Area -->
                <div class="space-y-6 flex flex-col h-[600px]">
                    
                    <!-- New Order Form -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-cart-plus text-green-500 mr-2"></i>Fazer Pedido</h2>
                        <div class="flex space-x-3">
                            <input type="text" id="orderProductId" class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-400 outline-none" placeholder="ID do Produto (Selecione na lista)" readonly>
                            <input type="number" id="orderQuantity" class="w-24 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-400 outline-none" placeholder="Qtd" value="1" min="1">
                            <button onclick="createOrder()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold shadow transition">Comprar</button>
                        </div>
                    </div>

                    <!-- My Orders List -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex-1 flex flex-col overflow-hidden">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-box text-purple-500 mr-2"></i>Meus Pedidos</h2>
                            <button onclick="loadOrders()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded transition"><i class="fas fa-sync-alt mr-1"></i>Atualizar</button>
                        </div>
                        <div id="orderList" class="flex-1 overflow-y-auto space-y-4 pr-2">
                            <!-- Orders Load Here -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        let token = localStorage.getItem('jwt');
        let userId = localStorage.getItem('userId');
        let userRole = localStorage.getItem('userRole');
        let userName = localStorage.getItem('userName');

        const apiBase = ''; 

        function notify(msg, type = 'error', target = 'authMsg') {
            const el = document.getElementById(target);
            if(!el) {
                alert(msg);
                return;
            }
            el.className = `mt-4 text-center text-sm font-semibold ${type === 'success' ? 'text-green-600' : 'text-red-500'}`;
            el.innerText = msg;
            setTimeout(() => { el.innerText = ''; }, 5000);
        }

        function updateUI() {
            if (token) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('navUser').classList.remove('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                
                document.getElementById('userNameNav').innerText = userName || userId;
                document.getElementById('userRoleNav').innerText = userRole;

                if (userRole === 'admin') {
                    document.getElementById('adminProductSection').classList.remove('hidden');
                } else {
                    document.getElementById('adminProductSection').classList.add('hidden');
                }

                loadProducts();
                loadOrders();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('navUser').classList.add('hidden');
                document.getElementById('mainSection').classList.add('hidden');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if(!email || !password) return notify('Preencha email e senha', 'error');

            try {
                const res = await fetch(`${apiBase}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json().catch(()=>({}));
                if (res.ok) {
                    token = data.token;
                    userId = data.userId;
                    userRole = data.role;
                    userName = data.email || data.name || email;
                    localStorage.setItem('jwt', token);
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('userRole', userRole);
                    localStorage.setItem('userName', userName);
                    updateUI();
                } else {
                    notify(data.message || 'Falha no login', 'error');
                }
            } catch (err) {
                notify(err.message, 'error');
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if(!name || !email || !password) return notify('Preencha todos os campos', 'error');

            try {
                const res = await fetch(`${apiBase}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json().catch(()=>({}));
                if (res.ok) {
                    notify('Cadastro realizado com sucesso! Faça login.', 'success');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = password;
                } else {
                    notify(data.message || 'Falha no cadastro', 'error');
                }
            } catch (err) {
                notify(err.message, 'error');
            }
        }

        function logout() {
            token = null; userId = null; userRole = null; userName = null;
            localStorage.clear();
            updateUI();
        }

        function selectProduct(id) {
            document.getElementById('orderProductId').value = id;
            document.getElementById('orderQuantity').focus();
        }

        async function loadProducts() {
            const pt = document.getElementById('productList');
            pt.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Carregando produtos...</div>';
            try {
                const res = await fetch(`${apiBase}/products`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                const data = await res.json().catch(()=>[]);
                if (res.ok) {
                    if(data.length === 0) {
                        pt.innerHTML = '<div class="p-4 bg-gray-50 text-gray-500 rounded text-center text-sm border border-dashed">Nenhum produto cadastrado.</div>';
                        return;
                    }
                    pt.innerHTML = data.map(p => `
                        <div class="border border-gray-100 rounded-lg p-4 hover:shadow-md transition bg-gray-50 hover:bg-white flex justify-between items-center group cursor-pointer" onclick="selectProduct('${p.id}')">
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-800 text-lg group-hover:text-primary transition">${p.name}</h4>
                                <p class="text-gray-500 text-sm mb-2">${p.description}</p>
                                <div class="flex space-x-4 text-xs">
                                    <span class="bg-blue-100 text-blue-800 py-1 px-2 rounded-md font-semibold">R$ ${p.price.toFixed(2)}</span>
                                    <span class="bg-gray-200 text-gray-700 py-1 px-2 rounded-md font-medium"><i class="fas fa-boxes mr-1"></i>${p.stock} em estoque</span>
                                </div>
                            </div>
                            <div class="ml-4 text-primary opacity-0 group-hover:opacity-100 transition">
                                <i class="fas fa-chevron-right"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    pt.innerHTML = `<div class="text-red-500 text-sm p-4">${data.message || 'Erro ao carregar produtos'}</div>`;
                }
            } catch (err) {
                pt.innerHTML = `<div class="text-red-500 text-sm p-4">${err.message}</div>`;
            }
        }

        async function createProduct() {
            const name = document.getElementById('prodName').value;
            const description = document.getElementById('prodDesc').value;
            const price = parseFloat(document.getElementById('prodPrice').value);
            const stock = parseInt(document.getElementById('prodStock').value);

            if(!name || !price) return alert('Nome e Preço são obrigatórios');

            try {
                const res = await fetch(`${apiBase}/products`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, description, price, stock })
                });
                if (res.ok) {
                    document.getElementById('prodName').value = '';
                    document.getElementById('prodDesc').value = '';
                    document.getElementById('prodPrice').value = '';
                    document.getElementById('prodStock').value = '';
                    loadProducts();
                } else {
                    const data = await res.json().catch(()=>({}));
                    alert('Erro: ' + (data.message || res.statusText));
                }
            } catch (err) {
                alert('Erro: ' + err.message);
            }
        }

        async function loadOrders() {
            const ot = document.getElementById('orderList');
            ot.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Carregando pedidos...</div>';
            try {
                const res = await fetch(`${apiBase}/orders/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json().catch(()=>[]);
                if (res.ok) {
                    if(data.length === 0) {
                        ot.innerHTML = '<div class="p-4 bg-gray-50 text-gray-500 rounded text-center text-sm border border-dashed">Você ainda não fez nenhum pedido.</div>';
                        return;
                    }
                    ot.innerHTML = [...data].reverse().map(o => `
                        <div class="border border-gray-100 rounded-lg p-4 bg-gray-50 text-sm mb-3">
                            <div class="flex justify-between items-start mb-3 pb-3 border-b border-gray-200">
                                <div>
                                    <span class="text-xs text-gray-400 block mb-1">Pedido ID: ${o.id.substring(0,8)}...</span>
                                    <span class="bg-${o.status==='confirmed'?'green':'yellow'}-100 text-${o.status==='confirmed'?'green':'yellow'}-800 text-xs px-2 py-0.5 rounded font-semibold uppercase">${o.status}</span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-lg font-bold text-gray-800">R$ ${o.total.toFixed(2)}</span>
                                </div>
                            </div>
                            <ul class="space-y-1">
                                ${o.items.map(i => `
                                    <li class="flex justify-between text-gray-600">
                                        <span>${i.quantity}x Prod-${i.productId.substring(0,4)}</span>
                                        <span>R$ ${i.price.toFixed(2)}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `).join('');
                } else {
                    ot.innerHTML = `<div class="text-red-500 text-sm p-4">${data.message || 'Erro ao carregar pedidos'}</div>`;
                }
            } catch (err) {
                ot.innerHTML = `<div class="text-red-500 text-sm p-4">${err.message}</div>`;
            }
        }

        async function createOrder() {
            const productId = document.getElementById('orderProductId').value;
            const quantity = parseInt(document.getElementById('orderQuantity').value);

            if(!productId || !quantity || quantity < 1) return alert('Selecione um produto e a quantidade válida.');

            const btn = event.target;
            const originTxt = btn.innerText;
            btn.innerText = 'Processando...';
            btn.disabled = true;

            try {
                const res = await fetch(`${apiBase}/orders`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: userId,
                        items: [{ productId, quantity }]
                    })
                });
                
                if (res.ok) {
                    document.getElementById('orderProductId').value = '';
                    document.getElementById('orderQuantity').value = '1';
                    loadOrders();
                    loadProducts(); // to update stock potentially
                } else {
                    const data = await res.json().catch(()=>({}));
                    alert('Falha: ' + (data.message || res.statusText));
                }
            } catch (err) {
                alert('Erro: ' + err.message);
            } finally {
                btn.innerText = originTxt;
                btn.disabled = false;
            }
        }

        updateUI();
    </script>
</body>
</html>
